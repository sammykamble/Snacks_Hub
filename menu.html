<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menu – Snacks Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#e23744;--primary-dark:#c1121f;--dark:#282c3f;--gray:#686b78;--light:#f4f4f5;--white:#fff;--green:#26a541}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--light);color:var(--dark)}
a{text-decoration:none;color:inherit}
nav{background:var(--white);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.nav-inner{max-width:1280px;margin:auto;display:flex;align-items:center;gap:16px;padding:0 24px;height:68px}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:var(--primary)}
.search-bar{flex:1;max-width:500px;background:var(--light);border-radius:8px;display:flex;align-items:center;gap:8px;padding:0 14px;height:44px;border:1.5px solid transparent;transition:.2s}
.search-bar:focus-within{border-color:var(--primary);background:var(--white)}
.search-bar input{border:none;background:transparent;font-size:14px;width:100%;outline:none;font-family:'Be Vietnam Pro',sans-serif}
.search-bar .material-symbols-outlined{color:var(--gray);font-size:18px}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.nav-btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Be Vietnam Pro',sans-serif;transition:.2s}
.cart-btn{background:var(--primary);color:#fff;display:flex;align-items:center;gap:6px;position:relative}
.cart-badge{background:#fff;color:var(--primary);font-size:10px;font-weight:800;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.user-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--light);font-size:13px;font-weight:600;cursor:pointer;display:none}
/* Layout */
.layout{display:grid;grid-template-columns:240px 1fr 360px;max-width:1280px;margin:0 auto;padding:24px;gap:24px;align-items:start}
@media(max-width:1100px){.layout{grid-template-columns:200px 1fr}}
@media(max-width:768px){.layout{grid-template-columns:1fr;padding:16px}#catSidebar{display:none}#cartPanel{display:none}}
/* Category Sidebar */
.cat-sidebar{background:var(--white);border-radius:12px;padding:16px;position:sticky;top:88px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.cat-sidebar h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px;margin-bottom:4px}
.cat-link{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:.15s}
.cat-link:hover,.cat-link.active{background:rgba(226,55,68,.07);color:var(--primary);font-weight:700}
.cat-count{font-size:12px;color:var(--gray)}
/* Main menu */
.menu-main{}
.filter-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:8px 16px;border-radius:20px;border:1.5px solid #e0e0e0;background:var(--white);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px}
.filter-chip:hover,.filter-chip.active{border-color:var(--primary);color:var(--primary);background:rgba(226,55,68,.05)}
.filter-chip .material-symbols-outlined{font-size:15px}
.section-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--light)}
.menu-list{display:flex;flex-direction:column;gap:4px}
.menu-item{background:var(--white);border-radius:12px;display:flex;align-items:center;gap:16px;padding:16px;cursor:pointer;transition:.15s;border:1px solid transparent}
.menu-item:hover{border-color:#e0e0e0;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.menu-item-img-wrap{position:relative;flex-shrink:0}
.menu-item-img{width:100px;height:90px;border-radius:10px;object-fit:cover}
.menu-item-body{flex:1;min-width:0}
.veg-badge{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--green);display:inline-flex;align-items:center;justify-content:center;margin-bottom:4px}
.veg-dot{width:8px;height:8px;background:var(--green);border-radius:50%}
.item-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;margin-bottom:4px}
.item-desc{font-size:13px;color:var(--gray);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.item-meta{display:flex;align-items:center;gap:10px;margin-top:8px}
.item-rating{display:flex;align-items:center;gap:3px;background:#f0fdf4;color:var(--green);font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px}
.item-time{font-size:12px;color:var(--gray)}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0;min-width:90px}
.item-price{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:var(--dark)}
.add-to-cart{background:var(--white);border:1.5px solid var(--primary);color:var(--primary);border-radius:8px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Be Vietnam Pro',sans-serif;transition:.2s;display:flex;align-items:center;gap:4px}
.add-to-cart:hover{background:var(--primary);color:#fff}
.add-to-cart.in-cart{background:var(--primary);color:#fff}
/* Qty control inline */
.qty-inline{display:flex;align-items:center;gap:0;border:1.5px solid var(--primary);border-radius:8px;overflow:hidden}
.qty-inline button{background:var(--primary);color:#fff;border:none;width:32px;height:36px;cursor:pointer;font-size:18px;font-weight:700;transition:.15s;font-family:'Be Vietnam Pro',sans-serif}
.qty-inline button:hover{background:var(--primary-dark)}
.qty-inline span{padding:0 14px;font-weight:800;font-size:14px;color:var(--primary)}
/* Cart panel */
.cart-panel{background:var(--white);border-radius:12px;position:sticky;top:88px;box-shadow:0 2px 12px rgba(0,0,0,.06);max-height:calc(100vh - 110px);display:flex;flex-direction:column;overflow:hidden}
.cart-panel-header{padding:16px 20px;border-bottom:1px solid var(--light);font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px}
.cart-panel-items{flex:1;overflow-y:auto;padding:12px 20px}
.cp-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--light)}
.cp-item:last-child{border-bottom:none}
.cp-item-img{width:48px;height:48px;border-radius:8px;object-fit:cover}
.cp-item-info{flex:1;min-width:0}
.cp-item-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp-item-price{font-size:12px;color:var(--primary);font-weight:700}
.cp-qty{display:flex;align-items:center;gap:6px}
.cp-qty button{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--primary);background:transparent;color:var(--primary);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cp-qty button:hover{background:var(--primary);color:#fff}
.cp-qty span{font-size:13px;font-weight:700;min-width:16px;text-align:center}
.cart-panel-footer{padding:16px 20px;border-top:1px solid var(--light)}
.cp-total-row{display:flex;justify-content:space-between;font-size:13px;color:var(--gray);margin-bottom:6px}
.cp-grand{display:flex;justify-content:space-between;font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;color:var(--dark);border-top:1.5px solid var(--light);padding-top:10px;margin:8px 0 16px}
.checkout-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Be Vietnam Pro',sans-serif;display:flex;align-items:center;justify-content:space-between;transition:.2s}
.checkout-btn:hover{background:var(--primary-dark)}
.empty-cart{padding:40px 20px;text-align:center;color:var(--gray);font-size:14px}
.empty-cart .material-symbols-outlined{font-size:48px;opacity:.35;display:block;margin-bottom:8px}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--dark);color:#fff;padding:13px 22px;border-radius:10px;font-weight:600;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:.3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
<link rel="stylesheet" href="/dark-mode.css">
<link rel="stylesheet" href="/advanced-features.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo">🍕 Snacks Hub</a>
    <div class="search-bar">
      <span class="material-symbols-outlined">search</span>
      <input type="text" id="searchInput" placeholder="Search for dishes…"/>
    </div>
    <div class="nav-right">

      <button class="nav-btn" onclick="openWishlist()" style="background:var(--light);color:var(--dark);display:flex;align-items:center;gap:6px">
        <span class="material-symbols-outlined" style="font-size:18px;color:var(--primary)">favorite</span> Favorites
      </button>
      <button class="nav-btn cart-btn" onclick="scrollToCart()">
        <span class="material-symbols-outlined" style="font-size:18px">shopping_cart</span>
        Cart <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <div id="guestBtns" style="display:flex;gap:8px">
        <a href="/login"><button class="nav-btn" style="background:var(--light);color:var(--dark)">Login</button></a>
      </div>
      <div class="user-pill" id="userPill"><span class="material-symbols-outlined" style="font-size:18px">account_circle</span><span id="userName">User</span></div>
    </div>
  </div>
</nav>

<div class="layout">

  <!-- CATEGORY SIDEBAR -->
  <div id="catSidebar">
    <div class="cat-sidebar">
      <h3>Categories</h3>
      <div id="catList"></div>
    </div>
  </div>

  <!-- MENU MAIN -->
  <div class="menu-main">
    <div class="filter-row">
      <div class="filter-chip active" data-filter="all"><span class="material-symbols-outlined">apps</span>All</div>
      <div class="filter-chip" data-filter="veg"><span class="material-symbols-outlined">eco</span>Veg</div>
      <div class="filter-chip" data-filter="price"><span class="material-symbols-outlined">payments</span>Price ↑</div>
      <div class="filter-chip" data-filter="popular"><span class="material-symbols-outlined">trending_up</span>Popular</div>
    </div>
    <div id="menuSections"></div>
  </div>

  <!-- CART PANEL -->
  <div id="cartPanel">
    <div class="cart-panel">
      <div class="cart-panel-header">🛒 Your Order</div>
      <div class="cart-panel-items" id="cpItems">
        <div class="empty-cart"><span class="material-symbols-outlined">shopping_cart</span>Add items to get started</div>
      </div>
      <div class="cart-panel-footer" id="cpFooter" style="display:none">
        <div class="cp-total-row"><span>Subtotal</span><span id="cpSub">₹0</span></div>
        <!-- Delivery removed -->
        <div class="cp-grand"><span>Total</span><span id="cpTotal">₹0</span></div>
        <button class="checkout-btn" onclick="window.location.href='/checkout'"><span>Checkout</span><span id="cpTotalBtn">₹0</span></button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const Cart = {
  get: ()=>JSON.parse(localStorage.getItem('sh_cart')||'[]'),
  save: (c)=>{localStorage.setItem('sh_cart',JSON.stringify(c));Cart.updateUI();renderCartPanel();},
  add: (item)=>{
    const c=Cart.get();const ex=c.find(i=>i.id===item.id);
    ex?ex.qty++:c.push({...item,qty:1});
    Cart.save(c);showToast(`✅ ${item.name} added!`);renderMenuItems(allItems);
  },
  updateQty:(id,delta)=>{const c=Cart.get();const it=c.find(i=>i.id===id);if(!it)return;it.qty+=delta;if(it.qty<=0)return Cart.save(c.filter(i=>i.id!==id));Cart.save(c);renderMenuItems(allItems);},
  count:()=>Cart.get().reduce((s,i)=>s+i.qty,0),
  total:()=>Cart.get().reduce((s,i)=>s+i.price*i.qty,0),
  updateUI:()=>{
    document.getElementById('cartBadge').textContent=Cart.count();
  }
};

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function scrollToCart(){document.getElementById('cartPanel').scrollIntoView({behavior:'smooth'});}

let allItems=[];

async function loadMenu(){
  const res=await fetch('/api/menu');
  allItems=await res.json();
  buildCatSidebar(allItems);
  renderMenuItems(allItems);
}

function buildCatSidebar(items){
  const cats=[...new Set(items.map(i=>i.category))];
  const el=document.getElementById('catList');
  el.innerHTML=`<div class="cat-link active" data-cat="All" onclick="filterCat('All',this)"><span>All Items</span><span class="cat-count">${items.length}</span></div>`
    +cats.map(c=>`<div class="cat-link" data-cat="${c}" onclick="filterCat('${c}',this)"><span>${c}</span><span class="cat-count">${items.filter(i=>i.category===c).length}</span></div>`).join('');
}

function filterCat(cat,el){
  document.querySelectorAll('.cat-link').forEach(l=>l.classList.remove('active'));
  el.classList.add('active');
  const filtered=cat==='All'?allItems:allItems.filter(i=>i.category===cat);
  renderMenuItems(filtered);
}

function renderMenuItems(items){
  const cart=Cart.get();
  const el=document.getElementById('menuSections');
  if(!items.length){el.innerHTML='<p style="color:var(--gray);padding:20px">No items found.</p>';return;}

  const cats=[...new Set(items.map(i=>i.category))];
  el.innerHTML=cats.map(cat=>{
    const catItems=items.filter(i=>i.category===cat);
    return `<div class="section-label">${cat}</div><div class="menu-list">
    ${catItems.map(item=>{
      const inCart=cart.find(c=>c.id===item.id);
      return `<div class="menu-item">
        <div class="menu-item-body">
          <div><span class="veg-badge"><span class="veg-dot"></span></span></div>
          <div class="item-name" style="display:flex;align-items:center;justify-content:space-between">
            ${item.name}
            <button onclick="toggleWish(this, ${item.id})" title="Wishlist" style="border:none;background:transparent;cursor:pointer;color:${Wishlist.has(item.id)?'var(--primary)':'var(--gray)'}"><span class="material-symbols-outlined" style="font-size:18px;fill:${Wishlist.has(item.id)?'1':'0'}">favorite</span></button>
          </div>
          <div class="item-desc">${item.description||''}</div>
          <div class="item-meta">
            <div class="item-rating"><span class="material-symbols-outlined" style="font-size:12px;fill:1">star</span>4.2</div>
            <span class="item-time">Available for Pickup</span>
          </div>
        </div>
        <img class="menu-item-img" src="${item.image_url}" onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=200'" loading="lazy"/>
        <div class="item-right">
          <div class="item-price">₹${parseFloat(item.price).toFixed(2)}</div>
          <div style="display:flex;gap:4px;margin-bottom:8px">
            <button class="nav-btn btn-outline" style="padding:6px 10px;font-size:11px" onclick="openCustomization({id:${item.id},name:'${item.name.replace(/'/g,"\\'")}',price:${item.price},image_url:'${item.image_url}',description:'${(item.description || '').replace(/'/g,"\\'")}'})" title="Customize">
              <span class="material-symbols-outlined" style="font-size:14px">tune</span>
            </button>
            <button class="nav-btn btn-outline" style="padding:6px 10px;font-size:11px" onclick="addShareButtons(${item.id})" title="Share">
              <span class="material-symbols-outlined" style="font-size:14px">share</span>
            </button>
          </div>
          ${inCart
            ?`<div class="qty-inline"><button onclick="Cart.updateQty(${item.id},-1)">−</button><span>${inCart.qty}</span><button onclick="Cart.updateQty(${item.id},1)">+</button></div>`
            :`<button class="add-to-cart" onclick="Cart.add({id:${item.id},name:'${item.name.replace(/'/g,"\\'")}',price:${item.price},image_url:'${item.image_url}'})"><span class="material-symbols-outlined" style="font-size:16px">add</span>ADD</button>`
          }
        </div>
      </div>`;
    }).join('')}
    </div>`;
  }).join('<br/>');
}

function renderCartPanel(){
  const cart=Cart.get();
  const cpItems=document.getElementById('cpItems');
  const cpFooter=document.getElementById('cpFooter');
  if(cart.length===0){
    cpItems.innerHTML='<div class="empty-cart"><span class="material-symbols-outlined">shopping_cart</span>Add items to get started</div>';
    cpFooter.style.display='none';return;
  }
  cpFooter.style.display='block';
  cpItems.innerHTML=cart.map(item=>`
  <div class="cp-item">
    <img class="cp-item-img" src="${item.image_url}" onerror="this.src='https://via.placeholder.com/48'"/>
    <div class="cp-item-info">
      <div class="cp-item-name">${item.name}</div>
      <div class="cp-item-price">₹${(item.price*item.qty).toFixed(2)}</div>
    </div>
    <div class="cp-qty">
      <button onclick="Cart.updateQty(${item.id},-1)">−</button>
      <span>${item.qty}</span>
      <button onclick="Cart.updateQty(${item.id},1)">+</button>
    </div>
  </div>`).join('');

  const sub=Cart.total(),total=sub;
  document.getElementById('cpSub').textContent=`₹${sub.toFixed(2)}`;
  document.getElementById('cpTotal').textContent=`₹${total.toFixed(2)}`;
  document.getElementById('cpTotalBtn').textContent=`₹${total.toFixed(2)}`;
}

// Search
document.getElementById('searchInput').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  renderMenuItems(allItems.filter(i=>i.name.toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q)));
});

// Filters
document.querySelectorAll('.filter-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    let items=[...allItems];
    if(chip.dataset.filter==='price') items.sort((a,b)=>a.price-b.price);
    else if(chip.dataset.filter==='popular') items.sort((a,b)=>b.id-a.id);
    else if(chip.dataset.filter==='veg') items=items.filter(i=>i.category==='Healthy'||i.category==='Snacks');
    renderMenuItems(items);
  });
});

// Auth
const session=JSON.parse(localStorage.getItem('sh_session')||'null');
if(session?.user){
  document.getElementById('guestBtns').style.display='none';
  const pill=document.getElementById('userPill');pill.style.display='flex';
  document.getElementById('userName').textContent=session.user.user_metadata?.name||session.user.email?.split('@')[0]||'User';
}

Cart.updateUI();
renderCartPanel();
loadMenu();
</script>
<script src="/features.js"></script>
<script src="/advanced-features.js"></script>
<script src="/reviews.js"></script>
<script src="/advanced-search.js"></script>
</body>
</html>
