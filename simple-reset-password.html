<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password - Snacks Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#1c1c2e,#16213e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
h1{color:#e23744;margin-bottom:10px;text-align:center}
p{color:#666;margin-bottom:30px;text-align:center;font-size:14px}
.form-group{margin-bottom:20px}
label{display:block;font-weight:bold;margin-bottom:8px;color:#333}
input{width:100%;padding:14px;border:2px solid #ddd;border-radius:10px;font-size:14px}
input:focus{outline:none;border-color:#e23744}
button{width:100%;padding:16px;background:#e23744;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
button:hover{background:#c1121f}
button:disabled{opacity:0.5;cursor:not-allowed}
.error{color:#e23744;font-size:13px;margin-top:5px;font-weight:bold}
.success{background:#26a541;color:#fff;padding:15px;border-radius:10px;text-align:center;margin-bottom:20px;font-weight:bold}
.link{text-align:center;margin-top:20px}
.link a{color:#e23744;font-weight:bold;text-decoration:none}
</style>
</head>
<body>

<div class="card">
  <h1>🔒 Reset Password</h1>
  <p>Enter your email and new password</p>

  <div id="successMsg" class="success" style="display:none">
    ✅ Password reset successful! You can now login.
  </div>

  <form id="resetForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" required />
      <div class="error" id="emailError"></div>
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="password" placeholder="Enter new password" required minlength="6" />
      <div class="error" id="passwordError"></div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6" />
      <div class="error" id="confirmError"></div>
    </div>

    <button type="submit" id="submitBtn">Reset Password</button>
  </form>

  <div class="link">
    <a href="/login">← Back to Login</a>
  </div>
</div>

<script>
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const submitBtn = document.getElementById('submitBtn');
  
  // Clear errors
  document.getElementById('emailError').textContent = '';
  document.getElementById('passwordError').textContent = '';
  document.getElementById('confirmError').textContent = '';
  
  // Validation
  if (password.length < 6) {
    document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
    return;
  }
  
  if (password !== confirmPassword) {
    document.getElementById('confirmError').textContent = 'Passwords do not match';
    return;
  }
  
  // Disable button
  submitBtn.disabled = true;
  submitBtn.textContent = 'Resetting...';
  
  try {
    const response = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
      setTimeout(() => window.location.href = '/login', 2000);
    } else {
      document.getElementById('emailError').textContent = data.error || 'Failed to reset password';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    }
  } catch (error) {
    document.getElementById('emailError').textContent = 'Network error. Please try again.';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Reset Password';
  }
});
</script>

</body>
</html>
