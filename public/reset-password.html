<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password - Snacks Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#e23744;--red-dark:#c1121f;--orange:#ff6b35;
  --dark:#1c1c1c;--dark2:#282c3f;--gray:#686b78;--light-gray:#f4f4f5;
  --white:#fff;--green:#26a541;--yellow:#f8a305;
  --shadow:0 4px 24px rgba(0,0,0,.1);--radius:16px
}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1c1c2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.ms{font-family:'Material Symbols Outlined';font-size:22px;line-height:1;font-style:normal;display:inline-flex;align-items:center;justify-content:center}

.page{width:100%;max-width:440px}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:32px;font-weight:900;color:#fff;text-align:center;margin-bottom:32px;display:flex;align-items:center;justify-content:center;gap:12px}
.logo-emoji{font-size:42px}

.card{background:#fff;border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.card-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;color:var(--dark);margin-bottom:8px;text-align:center}
.card-subtitle{font-size:14px;color:var(--gray);text-align:center;margin-bottom:32px;line-height:1.6}

.form-group{margin-bottom:20px}
.form-label{display:block;font-size:14px;font-weight:700;color:var(--dark);margin-bottom:8px}
.form-input{width:100%;padding:14px 16px;border-radius:12px;border:2px solid #e0e0e0;font-size:14px;font-family:'Inter',sans-serif;transition:.2s;background:#fff}
.form-input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(226,55,68,.08)}
.form-input.error{border-color:var(--red)}
.error-msg{color:var(--red);font-size:12px;margin-top:6px;font-weight:600}

.btn{width:100%;padding:16px;border-radius:12px;border:none;font-size:15px;font-weight:800;cursor:pointer;transition:.2s;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,var(--red),var(--orange));color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(226,55,68,.4)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.back-link{display:block;text-align:center;margin-top:24px;color:var(--gray);font-size:14px;font-weight:600;text-decoration:none;transition:.2s}
.back-link:hover{color:var(--red)}

.success-box{background:linear-gradient(135deg,#26a541,#22c55e);color:#fff;padding:20px;border-radius:12px;text-align:center;margin-bottom:24px}
.success-box .ms{font-size:48px;margin-bottom:12px}
.success-box h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px}
.success-box p{font-size:14px;opacity:.9}

.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark2);color:#fff;padding:14px 28px;border-radius:12px;font-weight:700;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:.3s;display:flex;align-items:center;gap:10px;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<link rel="stylesheet" href="/dark-mode.css">
<link rel="stylesheet" href="/advanced-features.css">
</head>
<body>

<div class="page">
  <div class="logo"><span class="logo-emoji">🍕</span> Snacks Hub</div>
  
  <div class="card">
    <div id="successMessage" style="display:none">
      <div class="success-box">
        <span class="ms">check_circle</span>
        <h3>Password Reset Successful!</h3>
        <p>Your password has been updated. You can now login with your new password.</p>
      </div>
      <a href="/login" class="btn btn-primary">Go to Login</a>
    </div>

    <div id="resetForm">
      <h2 class="card-title">Reset Your Password</h2>
      <p class="card-subtitle">Enter your new password below. Make sure it's strong and secure.</p>

      <form id="passwordResetForm">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" id="newPassword" class="form-input" placeholder="Enter new password" required minlength="6"/>
          <div class="error-msg" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password" required minlength="6"/>
          <div class="error-msg" id="confirmError"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span class="ms">lock_reset</span>
          <span>Reset Password</span>
        </button>
      </form>

      <a href="/login" class="back-link">← Back to Login</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Toast notification
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Get access token from URL hash
function getAccessToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  return params.get('access_token');
}

// Check if we have an access token
const accessToken = getAccessToken();
if (!accessToken) {
  showToast('❌ Invalid or expired reset link');
  setTimeout(() => window.location.href = '/login', 2000);
}

// Handle form submission
document.getElementById('passwordResetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const submitBtn = document.getElementById('submitBtn');
  
  // Clear previous errors
  document.getElementById('passwordError').textContent = '';
  document.getElementById('confirmError').textContent = '';
  document.getElementById('newPassword').classList.remove('error');
  document.getElementById('confirmPassword').classList.remove('error');
  
  // Validation
  let hasError = false;
  
  if (newPassword.length < 6) {
    document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
    document.getElementById('newPassword').classList.add('error');
    hasError = true;
  }
  
  if (newPassword !== confirmPassword) {
    document.getElementById('confirmError').textContent = 'Passwords do not match';
    document.getElementById('confirmPassword').classList.add('error');
    hasError = true;
  }
  
  if (hasError) return;
  
  // Disable button
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="ms">hourglass_empty</span><span>Resetting...</span>';
  
  try {
    const response = await fetch('/api/auth/update-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${accessToken}`
      },
      body: JSON.stringify({ password: newPassword })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      // Show success message
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('successMessage').style.display = 'block';
      showToast('✅ Password reset successful!');
    } else {
      throw new Error(data.error || 'Failed to reset password');
    }
  } catch (error) {
    console.error('Reset error:', error);
    showToast('❌ ' + error.message);
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<span class="ms">lock_reset</span><span>Reset Password</span>';
  }
});

// Password strength indicator
document.getElementById('newPassword').addEventListener('input', (e) => {
  const password = e.target.value;
  const errorMsg = document.getElementById('passwordError');
  
  if (password.length > 0 && password.length < 6) {
    errorMsg.textContent = 'Password is too short';
    errorMsg.style.color = '#f8a305';
  } else if (password.length >= 6) {
    errorMsg.textContent = '✓ Password strength: Good';
    errorMsg.style.color = '#26a541';
  } else {
    errorMsg.textContent = '';
  }
});
</script>
<script src="/features.js"></script>
<script src="/advanced-features.js"></script>
</body>
</html>
